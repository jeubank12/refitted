# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    # Check for updates to GitHub Actions every weekday
    interval: "weekly"
  reviewers:
  - "jeubank12"

# Updates for Gradle dependencies used in the app
- package-ecosystem: gradle
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10
  reviewers:
  - "jeubank12"
  groups:
    # ANDROID UI FRAMEWORK (mega group - handles all AndroidX convergence)
    # Why grouped: room-paging bridges Room ↔ Paging ↔ Compose
    #              All *-compose variants depend on compose.runtime
    #              Platform-aligned lifecycle, navigation, activity, savedstate
    android-ui-framework:
      patterns:
        - "*compose*"
        - "*room*"
        - "*sqlite*"
        - "*paging*"
        - "*navigation*"
        - "*lifecycle*"
        - "androidx.activity*"
        - "androidx.fragment*"
        - "*savedstate*"
        - "*credentials*"
        - "*accompanist*"
        - "com.google.android.libraries.identity.googleid*"

    # BACKEND SERVICES (interact for auth/identity federation)
    # Why grouped: Firebase Auth used with AWS Cognito for identity
    backend-services:
      patterns:
        - "com.google.firebase*"
        - "*firebase*"
        - "com.amazonaws*"

    # DEPENDENCY INJECTION (hilt depends on dagger core)
    dependency-injection:
      patterns:
        - "*hilt*"
        - "*dagger*"

    # KOTLIN ECOSYSTEM (language + stdlib + coroutines + functional)
    # Why grouped: Coroutines BOM, Arrow platform, all Kotlin-related
    kotlin-ecosystem:
      patterns:
        - "org.jetbrains.kotlin*"
        - "org.jetbrains.kotlinx*"
        - "kotlin*"
        - "*ksp*"
        - "io.arrow-kt*"

    # TESTING (pure testing tools, no production convergence)
    testing:
      patterns:
        - "*junit*"
        - "com.google.truth*"
        - "androidx.test*"
        - "io.mockk*"
        - "app.cash.turbine*"

    # ANDROIDX CORE (fallback for remaining androidx libs)
    androidx-core:
      patterns:
        - "androidx*"
      exclude-patterns:
        - "*compose*"
        - "*room*"
        - "*sqlite*"
        - "*paging*"
        - "*navigation*"
        - "*lifecycle*"
        - "androidx.activity*"
        - "androidx.fragment*"
        - "*savedstate*"
        - "*credentials*"
        - "*hilt*"
        - "androidx.test*"

# Updates for npm dependencies used in web
- package-ecosystem: npm
  directories: 
    - "/web"
    - "/admin"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 10
  reviewers:
  - "jeubank12"
  groups:
    next:
      patterns:
      - "next*"
    eslint:
      patterns:
      - "*eslint*"
      - "prettier"
    react:
      patterns:
      - "*react*"
      - "*redux*"
      - "reselect"
      exclude-patterns:
      - "@emotion/react"
    emotion:
      patterns:
      - "@emotion*"
    base:
      patterns:
      - "typescript"
      - "esbuild"
      - "@types/node"
      - "@aws-sdk/*"
      - "@types/aws*"
      - "firebase*"
      - "*lodash*"
